<!-- MathJax for rendering LaTeX math -->
<script type="text/javascript" async
  src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-MML-AM_CHTML">
</script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [['$','$'], ['\\(','\\)']],
      displayMath: [['$$','$$'], ['\\[','\\]']],
      processEscapes: true,
      skipTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
      ignoreClass: 'language-python|language-bash|highlight'
    },
    TeX: {
      equationNumbers: { autoNumber: "AMS" }
    }
  });
</script>

<!-- Re-typeset MathJax when a collapsible details block is opened -->
<script>
  document.addEventListener('toggle', function(e) {
    if (e.target.tagName === 'DETAILS' && e.target.open) {
      if (window.MathJax) MathJax.Hub.Queue(["Typeset", MathJax.Hub, e.target]);
    }
  }, true);
</script>

<!-- Custom styles for blog posts -->
<style>
  /* Make images display as block elements, centered, full width for legibility */
  .page__content img {
    display: block;
    margin: 1.5em auto;
    width: 100%;
    max-width: 100%;
    height: auto;
  }

  /* Style image captions */
  .page__content img + em {
    display: block;
    text-align: center;
    font-size: 0.9em;
    color: #999;
    margin-top: -1em;
    margin-bottom: 1.5em;
  }

  /* Ensure code blocks don't overflow */
  .page__content pre {
    overflow-x: auto;
  }

  /* Author profile bio: flush left, clean line breaks */
  .author__bio {
    text-align: left;
    line-height: 1.5;
  }

  /* Wide layout TOC: fixed sidebar matching MM default styling.
     Content keeps full wide width since TOC is out of flow. */
  @media (min-width: 80em) {
    .wide .sidebar__right {
      position: fixed;
      top: 4em;
      right: 2em;
      width: 300px;
      max-height: calc(100vh - 6em);
      overflow-y: auto;
      z-index: 10;
    }
  }

  /* Hide on screens without enough margin space */
  @media (max-width: 79.99em) {
    .wide .sidebar__right {
      display: none;
    }
  }

  /* Hide deeply nested TOC entries (from inside details blocks) */
  .sidebar__right .toc__menu ul ul ul {
    display: none;
  }
</style>
