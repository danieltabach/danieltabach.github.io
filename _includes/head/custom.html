<!-- MathJax for rendering LaTeX math -->
<script type="text/javascript" async
  src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-MML-AM_CHTML">
</script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [['$','$'], ['\\(','\\)']],
      displayMath: [['$$','$$'], ['\\[','\\]']],
      processEscapes: true,
      skipTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
      ignoreClass: 'language-python|language-bash|highlight'
    },
    TeX: {
      equationNumbers: { autoNumber: "AMS" }
    }
  });
</script>

<!-- Re-typeset MathJax when a collapsible details block is opened -->
<script>
  document.addEventListener('toggle', function(e) {
    if (e.target.tagName === 'DETAILS' && e.target.open) {
      if (window.MathJax) MathJax.Hub.Queue(["Typeset", MathJax.Hub, e.target]);
    }
  }, true);
</script>

<!-- Custom styles for blog posts -->
<style>
  /* Make images display as block elements, centered, full width for legibility */
  .page__content img {
    display: block;
    margin: 1.5em auto;
    width: 100%;
    max-width: 100%;
    height: auto;
  }

  /* Style image captions */
  .page__content img + em {
    display: block;
    text-align: center;
    font-size: 0.9em;
    color: #999;
    margin-top: -1em;
    margin-bottom: 1.5em;
  }

  /* Ensure code blocks don't overflow */
  .page__content pre {
    overflow-x: auto;
  }

  /* Author profile bio: flush left, clean line breaks */
  .author__bio {
    text-align: left;
    line-height: 1.5;
  }

  /* Wide layout + TOC: float in right margin, only on
     screens wide enough to have real margin space (1600px+) */
  @media (min-width: 100em) {
    .wide .sidebar__right {
      position: fixed;
      top: 4em;
      right: 3em;
      width: 220px;
      max-height: calc(100vh - 6em);
      overflow-y: auto;
      font-size: 0.85em;
      background: #fff;
      border-left: 3px solid #4a86c8;
      border-radius: 4px;
      padding: 1em 1em 1em 1.2em;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      z-index: 10;
    }

    .wide .sidebar__right .toc__menu a {
      color: #555;
      padding: 0.3em 0;
      display: block;
    }

    .wide .sidebar__right .toc__menu a:hover {
      color: #4a86c8;
    }
  }

  /* Below 1600px: hide floating TOC to avoid overlap */
  @media (max-width: 99.99em) {
    .wide .sidebar__right {
      display: none;
    }
  }
</style>
